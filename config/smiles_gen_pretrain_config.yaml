seed: 42

data:
  train_smi_path: ZINC_data/zinc_filtered.smi
  vocab_path: ZINC_data/zinc_vocab.csv
  has_header: true
  max_length: 128
  split_ratio: [0.8, 0.1, 0.1]
  split_index_path: outputs/smiles_gen_pretrain/splits/zinc_split_offsets.pt

tokenizer:
  pad_token: "[PAD]"
  bos_token: "[BOS]"
  eos_token: "[EOS]"
  unk_token: "[UNK]"

model:
  architecture: SmilesGPT2Generator
  max_position_embeddings: 128
  n_embd: 768
  n_layer: 8
  n_head: 8
  resid_pdrop: 0.1
  embd_pdrop: 0.1
  attn_pdrop: 0.1
  layer_norm_epsilon: 1.0e-5
  add_cross_attention: false

training:
  output_dir: outputs/smiles_gen_pretrain
  per_device_train_batch_size: 128
  per_device_eval_batch_size: 256
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-4
  betas: [0.9, 0.95]
  eps: 1.0e-8
  weight_decay: 0.01
  max_epochs: 40
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  mixed_precision: bf16
  num_workers: 8
  logging_steps: 100
  checkpoint_steps: 1000
  save_state_dict_only: true

early_stopping:
  patience: 10
  min_delta: 0.0

generation:
  max_new_tokens: 128
  do_sample: true
  temperature: 1.0
  top_k: 50
  top_p: 0.95
